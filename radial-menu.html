<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Phantom Menu - Hover Edition</title>
<style>
body {
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #0f0f0f;
}

/* home button */
.home-btn{
    position:fixed;left:18px;top:18px;z-index:1000;padding:8px 12px;border-radius:8px;
    background:rgba(255,255,255,0.04);color:#00AEEF;text-decoration:none;font-weight:600;border:1px solid rgba(255,255,255,0.04);
}

.home-btn:hover{background:rgba(255,255,255,0.06)}

.menu {
    position: relative;
    width: 320px;
    height: 320px;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
}

.dot {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 8px;
    height: 8px;
    background: #00AEEF;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    transition: .45s cubic-bezier(.2, .8, .2, 1);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #0ff;
}

.dot svg {
    opacity: 0;
    width: 24px;
    height: 24px;
    stroke: #0ff;
    fill: none;
    stroke-width: 2;
    transition: .2s;
}

/* === HOVER ACTIONS === */

/* Target dots and their internal SVGs when menu container is hovered */
.menu:hover .dot {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    background: #1f1f1f;
}

.menu:hover .dot svg {
    opacity: 1;
    transition-delay: .15s;
}

/* Fan-out directional vectors on hover */
.menu:hover .i1 { transform: translate(calc(-50% - 80px), calc(-50% - 80px)); }
.menu:hover .i2 { transform: translate(-50%, calc(-50% - 110px)); }
.menu:hover .i3 { transform: translate(calc(-50% + 80px), calc(-50% - 80px)); }
.menu:hover .i4 { transform: translate(calc(-50% - 110px), -50%); }
.menu:hover .i5 { transform: translate(-50%, -50%); }
.menu:hover .i6 { transform: translate(calc(-50% + 110px), -50%); }
.menu:hover .i7 { transform: translate(calc(-50% - 80px), calc(-50% + 80px)); }
.menu:hover .i8 { transform: translate(-50%, calc(-50% + 110px)); }
.menu:hover .i9 { transform: translate(calc(-50% + 80px), calc(-50% + 80px)); }
</style>
</head>
<body>

<a class="home-btn" href="index.html">← Home</a>

<div class="menu" id="m"></div>

<script>
const m = document.getElementById('m');
const paths = [
    'M3 10.5L12 3l9 7.5M5 10v10h14V10',
    'M15 18l-6-6 6-6',
    'M9 6l6 6-6 6',
    'M21 21l-4.3-4.3',
    'M5 7h14M5 12h14M5 17h14',
    'M12 2v3M12 19v3M2 12h3M19 12h3',
    'M4 21c2-4 14-4 16 0',
    'M18 8a6 6 0 10-12 0',
    'M12 2v10'
];

// Dynamically generate the 9 grid elements
for(let i = 1; i <= 9; i++) {
    let d = document.createElement('div');
    d.className = 'dot i' + i;
    let extra = '';
    if(i == 4) extra = '<circle cx="11" cy="11" r="7"/>';
    if(i == 6) extra = '<circle cx="12" cy="12" r="3"/>';
    if(i == 7) extra = '<circle cx="12" cy="8" r="4"/>';
    
    d.innerHTML = `<svg viewBox="0 0 24 24">${extra}<path d="${paths[i-1]}"/></svg>`;
    m.appendChild(d);
}
</script>
</body>
</html>
